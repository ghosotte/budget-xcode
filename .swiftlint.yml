excluded:
  - .build
  - DerivedData
  - Pods
  - Carthage
  - budget.xcodeproj

disabled_rules:
  - line_length
  - trailing_whitespace
  - todo

opt_in_rules:
  - closure_spacing
  - empty_count
  - first_where
  - last_where
  - redundant_nil_coalescing
  - sorted_first_last
  - unused_import

identifier_name:
  min_length: 1
  excluded:
    - id

type_name:
  min_length: 3
  max_length: 60

function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 400
  error: 800

file_length:
  warning: 600
  error: 1200
