name: iOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve SPM packages
        run: xcodebuild -resolvePackageDependencies -project budget.xcodeproj

      - name: Build (iOS Simulator)
        run: |
          xcodebuild build \
            -project budget.xcodeproj \
            -scheme budget \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Test
        run: |
          xcodebuild test \
            -project budget.xcodeproj \
            -scheme budget \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            | xcbeautify
